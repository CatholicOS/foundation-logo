name: Deploy Logo Symbolism to WordPress

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Convert & publish logo symbolism
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect content changes
        id: changes
        run: |
          # For tag triggers, compare against the previous tag; for manual triggers, compare against HEAD~1
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$GITHUB_REF_NAME" ]; then
              DIFF_BASE="$PREV_TAG"
            else
              DIFF_BASE="HEAD~1"
            fi
          else
            DIFF_BASE="HEAD~1"
          fi

          echo "Comparing against: $DIFF_BASE"
          CHANGED=$(git diff --name-only "$DIFF_BASE" HEAD 2>/dev/null || echo "FIRST_RUN")

          # Images
          if echo "$CHANGED" | grep -q '^images/'; then
            echo "images_changed=true" >> "$GITHUB_OUTPUT"
            echo "  images/ changed"
          else
            echo "images_changed=false" >> "$GITHUB_OUTPUT"
            echo "  images/ unchanged"
          fi

          # Logo symbolism page
          if echo "$CHANGED" | grep -q 'CDCF Logo Symbolism.md'; then
            echo "page_changed=true" >> "$GITHUB_OUTPUT"
            echo "  CDCF Logo Symbolism.md changed"
          else
            echo "page_changed=false" >> "$GITHUB_OUTPUT"
            echo "  CDCF Logo Symbolism.md unchanged"
          fi

          # Explanation post
          if echo "$CHANGED" | grep -q 'symbolism-of-24.md'; then
            echo "explanation_changed=true" >> "$GITHUB_OUTPUT"
            echo "  symbolism-of-24.md changed"
          else
            echo "explanation_changed=false" >> "$GITHUB_OUTPUT"
            echo "  symbolism-of-24.md unchanged"
          fi

          # Combined flag — true when any content file changed
          if echo "$CHANGED" | grep -qE '^images/|CDCF Logo Symbolism\.md|symbolism-of-24\.md'; then
            echo "content_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "content_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pandoc
        if: steps.changes.outputs.content_changed == 'true'
        uses: pandoc/actions/setup@v1

      - name: Convert Markdown to HTML fragments
        if: steps.changes.outputs.content_changed == 'true'
        run: |
          pandoc 'CDCF Logo Symbolism.md' --wrap=none -f markdown -t html5 -o logo-symbolism.html
          pandoc symbolism-of-24.md --wrap=none -f markdown -t html5 -o symbolism-of-24.html

      - name: Upload images to WordPress
        if: steps.changes.outputs.page_changed == 'true' || steps.changes.outputs.images_changed == 'true'
        id: upload-images
        env:
          WP_REST_URL: ${{ secrets.WP_REST_URL }}
          WP_APP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          IMAGES_CHANGED="${{ steps.changes.outputs.images_changed }}"
          NEW_MEDIA_IDS=""

          for SVG in images/*.svg; do
            FILENAME=$(basename "$SVG")
            SLUG="${FILENAME%.svg}"

            # Check if the media already exists in WordPress
            EXISTING=$(curl -s \
              -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
              "$WP_REST_URL/wp/v2/media?slug=$SLUG")
            EXISTING_ID=$(echo "$EXISTING" | jq -r '.[0].id // empty')
            EXISTING_URL=$(echo "$EXISTING" | jq -r '.[0].source_url // empty')

            if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
              if [ "$IMAGES_CHANGED" = "true" ]; then
                # Re-upload changed media
                echo "Updating existing media '$FILENAME' (ID: $EXISTING_ID)..."
                RESPONSE=$(curl -s -f -X POST \
                  -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
                  -H "Content-Disposition: attachment; filename=$FILENAME" \
                  -H "Content-Type: image/svg+xml" \
                  --data-binary "@$SVG" \
                  "$WP_REST_URL/wp/v2/media/$EXISTING_ID")
                WP_URL=$(echo "$RESPONSE" | jq -r '.source_url // empty')
                echo "  ✓ $FILENAME updated → $WP_URL"
              else
                # No changes — reuse existing URL
                WP_URL="$EXISTING_URL"
                echo "  ⏭ $FILENAME unchanged — using existing URL: $WP_URL"
              fi
            else
              # Upload new media
              echo "Uploading '$FILENAME'..."
              RESPONSE=$(curl -s -f -X POST \
                -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
                -H "Content-Disposition: attachment; filename=$FILENAME" \
                -H "Content-Type: image/svg+xml" \
                --data-binary "@$SVG" \
                "$WP_REST_URL/wp/v2/media")
              WP_URL=$(echo "$RESPONSE" | jq -r '.source_url // empty')
              MEDIA_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
              echo "  ✓ $FILENAME uploaded → $WP_URL (ID: $MEDIA_ID)"
              # Only newly uploaded media needs translation
              NEW_MEDIA_IDS="$NEW_MEDIA_IDS $MEDIA_ID"
            fi

            # Replace the relative path in the HTML with the WordPress URL
            if [ -n "$WP_URL" ]; then
              sed -i "s|images/$FILENAME|$WP_URL|g" logo-symbolism.html
            else
              echo "  ✗ $FILENAME — no URL available"
            fi
          done

          echo "new_media_ids=$NEW_MEDIA_IDS" >> "$GITHUB_OUTPUT"

      - name: Translate new images to all languages
        if: steps.upload-images.outputs.new_media_ids != ''
        env:
          WP_REST_URL: ${{ secrets.WP_REST_URL }}
          WP_APP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          NEW_MEDIA_IDS="${{ steps.upload-images.outputs.new_media_ids }}"
          TARGET_LANGS=("it" "es" "fr" "pt" "de")

          for MEDIA_ID in $NEW_MEDIA_IDS; do
            echo "Translating media ID $MEDIA_ID..."
            for LANG in "${TARGET_LANGS[@]}"; do
              RESPONSE=$(curl -s -f -X POST \
                -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
                -H "Content-Type: application/json" \
                -d "{\"source_id\": ${MEDIA_ID}, \"target_lang\": \"${LANG}\"}" \
                "$WP_REST_URL/cdcf/v1/translate")

              TRANSLATED_ID=$(echo "$RESPONSE" | jq -r '.post_id // empty')
              MESSAGE=$(echo "$RESPONSE" | jq -r '.message // empty')

              if [ -n "$TRANSLATED_ID" ]; then
                echo "  ✓ ${LANG}: media ID ${TRANSLATED_ID} — ${MESSAGE}"
              else
                echo "  ✗ ${LANG}: translation failed"
                echo "  Response: $RESPONSE"
              fi
            done
          done

          echo ""
          echo "All media translations complete."

      - name: Deploy to WordPress
        if: steps.changes.outputs.page_changed == 'true' || steps.changes.outputs.images_changed == 'true'
        id: deploy
        env:
          WP_REST_URL: ${{ secrets.WP_REST_URL }}
          WP_APP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          HTML_CONTENT=$(cat logo-symbolism.html)

          # Look up the "About" page ID to use as parent
          ABOUT_PAGE=$(curl -s \
            -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
            "$WP_REST_URL/wp/v2/pages?slug=about&status=publish")
          PARENT_ID=$(echo "$ABOUT_PAGE" | jq -r '.[0].id // empty')

          if [ -z "$PARENT_ID" ] || [ "$PARENT_ID" = "null" ]; then
            echo "Warning: 'About' page not found — publishing without parent."
            PARENT_ID="0"
          else
            echo "Found 'About' page (ID: $PARENT_ID) — setting as parent."
          fi

          # Check if a page with slug "logo-symbolism" already exists
          EXISTING=$(curl -s \
            -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
            "$WP_REST_URL/wp/v2/pages?slug=logo-symbolism&status=publish,draft")

          PAGE_ID=$(echo "$EXISTING" | jq -r '.[0].id // empty')

          PAYLOAD=$(jq -n \
            --arg title "Logo Symbolism" \
            --arg slug "logo-symbolism" \
            --arg content "$HTML_CONTENT" \
            --argjson parent "$PARENT_ID" \
            '{title: $title, slug: $slug, content: $content, parent: $parent, status: "publish"}')

          if [ -n "$PAGE_ID" ] && [ "$PAGE_ID" != "null" ]; then
            echo "Updating existing page (ID: $PAGE_ID)..."
            RESPONSE=$(curl -s -f -X POST \
              -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$WP_REST_URL/wp/v2/pages/$PAGE_ID")
          else
            echo "Creating new page..."
            RESPONSE=$(curl -s -f -X POST \
              -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$WP_REST_URL/wp/v2/pages")
            PAGE_ID=$(echo "$RESPONSE" | jq -r '.id')
          fi

          echo "page_id=$PAGE_ID" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Deployed logo symbolism to WordPress (page ID: $PAGE_ID, parent: $PARENT_ID)."

      - name: Translate to all languages
        if: steps.deploy.outputs.page_id != ''
        env:
          WP_REST_URL: ${{ secrets.WP_REST_URL }}
          WP_APP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          PAGE_ID="${{ steps.deploy.outputs.page_id }}"
          TARGET_LANGS=("it" "es" "fr" "pt" "de")

          for LANG in "${TARGET_LANGS[@]}"; do
            echo "Translating logo symbolism to ${LANG}..."
            RESPONSE=$(curl -s -f -X POST \
              -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
              -H "Content-Type: application/json" \
              -d "{\"source_id\": ${PAGE_ID}, \"target_lang\": \"${LANG}\"}" \
              "$WP_REST_URL/cdcf/v1/translate")

            TRANSLATED_ID=$(echo "$RESPONSE" | jq -r '.post_id // empty')
            MESSAGE=$(echo "$RESPONSE" | jq -r '.message // empty')

            if [ -n "$TRANSLATED_ID" ]; then
              echo "  ✓ ${LANG}: post ID ${TRANSLATED_ID} — ${MESSAGE}"
            else
              echo "  ✗ ${LANG}: translation failed"
              echo "  Response: $RESPONSE"
            fi
          done

          echo ""
          echo "All translations complete."

      - name: Deploy explanation post to WordPress
        if: steps.changes.outputs.explanation_changed == 'true'
        id: deploy-explanation
        env:
          WP_REST_URL: ${{ secrets.WP_REST_URL }}
          WP_APP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          HTML_CONTENT=$(cat symbolism-of-24.html)

          EXISTING=$(curl -s \
            -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
            "$WP_REST_URL/wp/v2/posts?slug=symbolism-of-24&status=publish,draft")

          POST_ID=$(echo "$EXISTING" | jq -r '.[0].id // empty')

          PAYLOAD=$(jq -n \
            --arg title "The Symbolism of 24" \
            --arg slug "symbolism-of-24" \
            --arg content "$HTML_CONTENT" \
            '{title: $title, slug: $slug, content: $content, status: "publish"}')

          if [ -n "$POST_ID" ] && [ "$POST_ID" != "null" ]; then
            echo "Updating existing post (ID: $POST_ID)..."
            curl -s -f -X POST \
              -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$WP_REST_URL/wp/v2/posts/$POST_ID" > /dev/null
          else
            echo "Creating new post..."
            RESPONSE=$(curl -s -f -X POST \
              -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$WP_REST_URL/wp/v2/posts")
            POST_ID=$(echo "$RESPONSE" | jq -r '.id')
          fi

          echo "post_id=$POST_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed explanation post (ID: $POST_ID)."

      - name: Translate explanation post
        if: steps.deploy-explanation.outputs.post_id != ''
        env:
          WP_REST_URL: ${{ secrets.WP_REST_URL }}
          WP_APP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          POST_ID="${{ steps.deploy-explanation.outputs.post_id }}"
          TARGET_LANGS=("it" "es" "fr" "pt" "de")

          for LANG in "${TARGET_LANGS[@]}"; do
            echo "Translating explanation post to ${LANG}..."
            RESPONSE=$(curl -s -f -X POST \
              -u "$WP_APP_USERNAME:$WP_APP_PASSWORD" \
              -H "Content-Type: application/json" \
              -d "{\"source_id\": ${POST_ID}, \"target_lang\": \"${LANG}\"}" \
              "$WP_REST_URL/cdcf/v1/translate")

            TRANSLATED_ID=$(echo "$RESPONSE" | jq -r '.post_id // empty')
            MESSAGE=$(echo "$RESPONSE" | jq -r '.message // empty')

            if [ -n "$TRANSLATED_ID" ]; then
              echo "  ✓ ${LANG}: post ID ${TRANSLATED_ID} — ${MESSAGE}"
            else
              echo "  ✗ ${LANG}: translation failed"
            fi
          done

      - name: Setup Node.js
        if: steps.changes.outputs.page_changed == 'true' || steps.changes.outputs.images_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Puppeteer browsers
        if: steps.changes.outputs.page_changed == 'true' || steps.changes.outputs.images_changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: puppeteer-${{ runner.os }}-

      - name: Install npm dependencies
        if: steps.changes.outputs.page_changed == 'true' || steps.changes.outputs.images_changed == 'true'
        run: npm ci

      - name: Build standalone HTML and PDF
        if: steps.changes.outputs.page_changed == 'true' || steps.changes.outputs.images_changed == 'true'
        run: |
          npm run build:html:standalone
          npm run build:pdf

      - name: Install librsvg
        if: steps.changes.outputs.images_changed == 'true'
        run: sudo apt-get install -y --no-install-recommends librsvg2-bin

      - name: Build press kit zip
        if: steps.changes.outputs.images_changed == 'true'
        run: |
          mkdir -p dist/press-kit
          rsvg-convert -w 1024 -h 1024 images/cdcf-logo.svg -o dist/press-kit/cdcf-logo.png
          cp images/cdcf-logo.svg dist/press-kit/
          cp images/element-cross.svg images/element-globe.svg images/element-net.svg dist/press-kit/
          cd dist && zip -r cdcf-logo-press-kit.zip press-kit/

      - name: Determine release version
        if: steps.changes.outputs.content_changed == 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Triggered by a tag push — use the tag as-is
            TAG="${GITHUB_REF_NAME}"
            echo "Using existing tag: $TAG"
          else
            # Triggered manually — auto-bump minor version
            LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
            if [ -z "$LATEST_TAG" ]; then
              TAG="v1.0"
              echo "No existing tags found — starting at $TAG"
            else
              MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
              MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f2)
              if [ "$MINOR" -ge 9 ]; then
                NEW_MAJOR=$((MAJOR + 1))
                TAG="v${NEW_MAJOR}.0"
              else
                NEW_MINOR=$((MINOR + 1))
                TAG="v${MAJOR}.${NEW_MINOR}"
              fi
              echo "Latest tag: $LATEST_TAG → bumping to $TAG"
            fi

            # Create and push the new tag via GitHub API (no git identity needed)
            gh api repos/${{ github.repository }}/git/refs \
              -f ref="refs/tags/$TAG" \
              -f sha="$(git rev-parse HEAD)"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with PDF and standalone HTML
        if: steps.version.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ASSETS=()
          [ -f dist/logo-symbolism-standalone.html ] && ASSETS+=(dist/logo-symbolism-standalone.html)
          [ -f dist/logo-symbolism.pdf ] && ASSETS+=(dist/logo-symbolism.pdf)
          [ -f dist/cdcf-logo-press-kit.zip ] && ASSETS+=(dist/cdcf-logo-press-kit.zip)
          gh release create "$TAG" \
            --title "Logo Symbolism $TAG" \
            --notes "Official logo symbolism of the Catholic Digital Commons Foundation, $TAG." \
            "${ASSETS[@]}"
