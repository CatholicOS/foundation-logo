name: Markdown Lint

on:
  push:
    paths:
      - '**/*.md'
      - '.markdownlint.yml'
      - '.github/workflows/markdown-lint.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.yml'
      - '.github/workflows/markdown-lint.yml'

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install linting tools
        run: npm install --no-save markdownlint-cli2 prettier
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Lint Markdown
        run: npm run lint:md
